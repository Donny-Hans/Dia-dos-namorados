<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Novo Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top:50px;">
        <h2>Cadastrar Novo Administrador</h2>
        <p>Este novo usuário terá acesso a este painel.</p>
        <form action="/admin/cadastrar-usuario" method="POST">
            <input type="text" name="novoUsuario" placeholder="Login do novo admin" required>
            <input type="password" name="novaSenha" placeholder="Senha dele" required>
            <button type="submit">Salvar Cadastro</button>
        </form>
        <br>
        <hr>
        <a href="/admin.html"><button class="btn-voltar">Voltar para Moderação</button></a>
    </div>
</body>
</html>
